<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"
      content="PDF Editor by vensas GmbH — edit, split, merge, and annotate PDFs entirely in your browser. No upload, no server: your files never leave your machine."
    />
    <title>PDF Editor · vensas GmbH</title>
    <script>
      // Apply a manually chosen theme before first paint to avoid flashing.
      try {
        var storedTheme = localStorage.getItem('theme');
        if (storedTheme === 'light' || storedTheme === 'dark') {
          document.documentElement.dataset.theme = storedTheme;
        }
      } catch (ignored) {}
    </script>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="vensas GmbH" />
